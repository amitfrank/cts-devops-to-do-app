server {
    listen 8080;

    # נתיב ראשי - ניתוב לאפליקציית ה-Node.js
    location / {
        proxy_pass http://web-app:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # הגנה על נתיב רגיש - בקרת גישה (Access Control)
    location /admin-panel {
        allow 127.0.0.1;   # מאפשר גישה רק ל-IP מקומי
        deny all;          # חוסם את כל שאר העולם (מחזיר 403 Forbidden)
        
        proxy_pass http://web-app:3000;
    }
}