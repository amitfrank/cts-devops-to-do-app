version: '3.8'

services:
  # שרת הפרוקסי (חזית המערכת)
  proxy:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "8080:8080"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - frontend-net
    depends_on:
      - web-app

  # אפליקציית ה-Node.js
  web-app:
    build: ./app
    container_name: nodejs-app
    restart: always
    env_file:
      - .env
    networks:
      - frontend-net
      - backend-net
    depends_on:
      - db

  # בסיס הנתונים MongoDB (מוגן ומבודד ברשת הפנימית)
  db:
    image: mongo:6.0-jammy
    container_name: mongodb-db
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${DB_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mongodata:/data/db
    networks:
      - backend-net

  # כלי הניהול הגרפי Mongo Express
  db-admin:
    image: mongo-express
    container_name: mongo-express-management
    restart: always
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${DB_USER}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${DB_PASSWORD}
      ME_CONFIG_MONGODB_SERVER: db # שם השירות של ה-DB ב-compose
    networks:
      - backend-net
    depends_on:
      - db

volumes:
  mongodata: # Volume ייעודי לשמירת המידע של MongoDB ביציאה מהקונטיינר

networks:
  frontend-net:
  backend-net: